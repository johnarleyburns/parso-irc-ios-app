name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  testflight-build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Accept Xcode License
        run: sudo xcodebuild -license accept

      - name: Cache XcodeGen
        id: cache-xcodegen
        uses: actions/cache@v4
        with:
          path: xcodegen
          key: xcodegen-2.45.3

      - name: Install XcodeGen
        if: steps.cache-xcodegen.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/yonaskolb/XcodeGen/releases/download/2.45.3/xcodegen.zip \
            -o xcodegen.zip
          unzip -o xcodegen.zip

      - name: Add XcodeGen to PATH
        run: echo "${GITHUB_WORKSPACE}/xcodegen/bin" >> $GITHUB_PATH

      - name: Import Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -eo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o certificate.p12
          security import certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k build.keychain
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            -o "$HOME/Library/MobileDevice/Provisioning Profiles/Parso_IRC_Chat_Client_App_Store.mobileprovision"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Set Build Number
        run: xcrun agvtool new-version -all ${{ github.run_number }}

      - name: Run Tests
        run: |
          xcodebuild test \
            -project ParsoIRC.xcodeproj \
            -scheme ParsoIRC \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            ONLY_ACTIVE_ARCH=YES

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project ParsoIRC.xcodeproj \
            -scheme ParsoIRC \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/ParsoIRC.xcarchive \
            ARCHS=arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            CI_TEAM="$TEAM_ID" \
            CI_CERT="iPhone Distribution" \
            CI_PROFILE="Parso IRC Chat Client App Store" \
            2>&1 | tee build.log
          if [ ! -d "./build/ParsoIRC.xcarchive" ]; then
            echo "Archive not found — build failed"
            grep -E 'error:' build.log | head -20
            exit 1
          fi

      - name: Export IPA
        run: |
          set -eo pipefail
          xcodebuild -exportArchive \
            -archivePath ./build/ParsoIRC.xcarchive \
            -exportPath ./output \
            -exportOptionsPlist ExportOptions.plist

      - name: Write App Store Connect API Key
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -eo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_PRIVATE_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -eo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file output/ParsoIRC.ipa \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8