name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'simulator'
        type: choice
        options:
          - simulator
          - testflight

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi
      
      - name: Install XcodeGen
        uses: alexandria-oss/setup-xcodegen@v1
      
      - name: Generate Xcode project
        run: xcodegen generate
      
      - name: Download iOS Simulator
        run: xcodebuild -downloadPlatform iOS 2>/dev/null || true
      
      - name: Build for iOS Simulator
        if: github.event_name != 'release' && (github.inputs.build_type != 'testflight' || github.inputs.build_type == '')
        run: |
          xcodebuild -project ParsoIRC.xcodeproj \
            -scheme ParsoIRC \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -50
      
      - name: Upload Simulator Build
        if: github.event_name != 'release' && (github.inputs.build_type != 'testflight' || github.inputs.build_type == '')
        uses: actions/upload-artifact@v4
        with:
          name: ParsoIRC-Simulator-Build
          path: build/ParsoIRC.xcarchive
          retention-days: 7