name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'simulator'
        type: choice
        options:
          - simulator
          - testflight

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      
      - name: Verify Xcode
        run: xcodebuild -version
      
      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen || {
            curl -o /tmp/xcodegen.zip https://github.com/youtype/xcodegen/releases/download/v2.40.0/xcodegen-2.40.0-mac-x86_64.zip
            unzip -o /tmp/xcodegen.zip -d /tmp
            sudo mv /tmp/xcodegen /usr/local/bin/xcodegen
            chmod +x /usr/local/bin/xcodegen
          }
      
      - name: Generate Xcode project
        run: xcodegen generate
      
      # ==========================================================================
      # SIMULATOR BUILD (no code signing required)
      # ==========================================================================
      - name: Build for iOS Simulator
        if: github.event_name != 'release' && (github.inputs.build_type != 'testflight' || github.inputs.build_type == '')
        run: |
          xcodebuild -project ParsoIRC.xcodeproj \
            -scheme ParsoIRC \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./build \
            build
      
      - name: Upload Simulator Build
        if: github.event_name != 'release' && (github.inputs.build_type != 'testflight' || github.inputs.build_type == '')
        uses: actions/upload-artifact@v4
        with:
          name: ParsoIRC-Simulator-Build
          path: build/ParsoIRC.xcarchive
          retention-days: 7
      
      # ==========================================================================
      # TESTFLIGHT BUILD (requires Apple Developer credentials)
      # ==========================================================================
      - name: Import Apple Certificate
        if: github.event_name == 'release' || github.inputs.build_type == 'testflight'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          # Decode certificate
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Import certificate
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k $KEYCHAIN_PATH $KEYCHAIN_PATH
          
          # List certificates to verify
          security find-identity -v -p codesigning $KEYCHAIN_PATH
      
      - name: Install Provisioning Profile
        if: github.event_name == 'release' || github.inputs.build_type == 'testflight'
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Verify profile
          security cms -D -i $PROFILE_PATH
      
      - name: Build for TestFlight
        if: github.event_name == 'release' || github.inputs.build_type == 'testflight'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcodebuild -project ParsoIRC.xcodeproj \
            -scheme ParsoIRC \
            -configuration Release \
            -archivePath build/ParsoIRC.xcarchive \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            PROVISIONING_PROFILE_SPECIFIER="Parso IRC" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            archive
      
      - name: Export IPA
        if: github.event_name == 'release' || github.inputs.build_type == 'testflight'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ParsoIRC.xcarchive \
            -exportPath output \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGNING_REQUIRED=YES \
            PROVISIONING_PROFILE_SPECIFIER="Parso IRC" \
            DEVELOPMENT_TEAM=$TEAM_ID
      
      - name: Upload to TestFlight
        if: github.event_name == 'release' || github.inputs.build_type == 'testflight'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          # Using altool to upload to TestFlight
          xcrun altool --upload-app -f output/ParsoIRC.ipa \
            -t ios \
            -u "$APPLE_ID" \
            -p "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --allow-expiring-app-versions
      
      - name: Upload TestFlight IPA
        if: github.event_name == 'release' || github.inputs.build_type == 'testflight'
        uses: actions/upload-artifact@v4
        with:
          name: ParsoIRC-TestFlight-IPA
          path: output/ParsoIRC.ipa

  test:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      
      - name: Generate project
        run: xcodegen generate
      
      - name: Run Tests
        run: |
          xcodebuild test -project ParsoIRC.xcodeproj \
            -scheme ParsoIRC \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./test_build