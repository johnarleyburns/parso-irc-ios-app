name: ParsoIRC
options:
  bundleIdPrefix: com.parso
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  configs:
    Debug:
      CODE_SIGNING_ALLOWED: NO
    Release:
      # Removed global signing overrides to prevent affecting Swift Packages
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"

targets:
  ParsoIRC:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ParsoIRC
        excludes:
          - "**/.DS_Store"
          - "**/Tests/**"
          - "**/*Tests.swift"
          - "**/*Mock*.swift"
          - "**/LinuxStubs/**"
          - "**/Phase1Tests.swift"
          - "**/Phase2Tests.swift"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.ios-irc-app
        INFOPLIST_KEY_CFBundleDisplayName: Parso IRC
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        ENABLE_TESTABILITY: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          # Injects the variables passed from the GitHub Actions Archive step
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "$(CI_CERT)"
          DEVELOPMENT_TEAM: "$(CI_TEAM)"
          PROVISIONING_PROFILE_SPECIFIER: "$(CI_PROFILE)"
          INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    dependencies:
      - package: SQLite

  ParsoIRCTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ParsoIRC/Core/Tests
        excludes:
          - "**/LinuxStubs/**"
    dependencies:
      - target: ParsoIRC
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ParsoIRC.app/ParsoIRC"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ParsoIRC:
    build:
      targets:
        ParsoIRC: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ParsoIRCTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ParsoIRCTests:
    build:
      targets:
        ParsoIRCTests: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release